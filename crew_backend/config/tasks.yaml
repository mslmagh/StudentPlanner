analyze_skills_task:
  description: >
    Aşağıdaki öğrencinin ders çalışma talebini analiz et ve bir beceri profili oluştur:
    - Ders: {course}
    - Seviye: {level}
    - Tercih Edilen Zaman: {preferred_time}
    - Çalışma Türü: {study_type}

    Şunları belirle: (1) Bu derste bu seviyede gereken temel beceriler,
    (2) {level} seviyesindeki bir öğrencinin olası bilgi eksiklikleri,
    (3) Bu öğrenciye en çok fayda sağlayacak partner profili.
    Analizini kısa tut — 3 ila 5 madde.

    ÖNEMLI: Yanıtını yalnızca Türkçe olarak ver.
  expected_output: >
    Gerekli beceriler, olası eksiklikler ve ideal partner profilini kapsayan
    3-5 maddelik kısa bir beceri profili. Türkçe yazılmış olmalı.
  agent: skill_analyzer

compatibility_task:
  description: >
    Talepte bulunan öğrenci ile aday partner arasındaki uyumu değerlendir:

    İstek sahibi öğrenci: Ders={course}, Seviye={level},
    Zaman={preferred_time}, Tür={study_type}

    Aday partner: {partner_profile}

    Uyumu 0 ile 100 arasında puanla ve bu eşleşme için ya da aleyhine
    olan en önemli 2 nedeni açıkla. Somut ol.

    ÖNEMLI: Yanıtını yalnızca Türkçe olarak ver.
  expected_output: >
    Bir uyumluluk puanı (0-100 arası tam sayı) ve puanın temel nedenlerini
    açıklayan 2 cümle. Format: "Puan: XX/100. [neden 1]. [neden 2]."
    Türkçe yazılmış olmalı.
  agent: compatibility_agent

study_planning_task:
  description: >
    Bu eşleşmiş çift için 1 haftalık bir çalışma planı tasarla:
    - Ders: {course}
    - Seviye: {level}
    - Müsait zaman dilimi: {preferred_time}
    - Çalışma formatı: {study_type}

    Plan haftada 5 oturum içermeli. Her oturumda gün, süre (45-90 dk)
    ve belirli bir konu veya etkinlik olmalı. Pratik ve motive edici tut.

    ÖNEMLI: Yanıtını yalnızca Türkçe olarak ver.
  expected_output: >
    5 oturumlu 1 haftalık çalışma planı. Her oturumda: Gün, Süre,
    Konu/Etkinlik bulunur. Düz metin formatı, başlık işaretleri yok.
    Türkçe yazılmış olmalı.
  agent: study_planner

